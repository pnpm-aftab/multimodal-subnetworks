# resnet3d_gender_bn_64base_2.2.2.2_exp01.yaml

mongo:
  host: "10.245.12.58"
  host_slurm: "arctrdcn018.rs.gsu.edu"
  validation_percent: 0.2
  index_id: "id"
  
wandb:
  team: "neuroneural"  # Your specified team name
  project: "holographic_project"  # Your requested project name

bit16: False

model:
  # config_file: /data/users2/jwardell1/multimodal-subnetworks/conf/resnet3d_gender_bn_64base_2.2.2.2_exp01.yaml
  masked: False
  sparsity: 0.7  # 70% sparsity for masked training
  snip_batch_size: 20
  n_classes: 1  # Binary gender classification
  model_channels: 64  # ResNet base channels
  model_label: "_resnet3d_gender_64base"
  volume_shape: [256, 256, 256]
  maxshape: 300
  optimize_inline: False
  use_groupnorm: False  # Using BatchNorm
  use_me: True  # Memory efficient version
  loss_weight: [0.5, 0.5]  # Balanced weights

paths:
  loadcheckpoint: False
  # model: "./logs/test/model.last.pth" # set loadcheckpoint to True to use
  logdir: "./logs/" # use experiment.experiment_name instead

client_creator:
  crop_tensor: False
  normalize: False  # Data already normalized

experiment:
  experiment_name: test # used in wandb name and logdir name
  cv_seed: 42
  cv_folds: 10
  lr_scale: 0.01
  cubesizes: 256
  numcubes: 1
  numvolumes: 8
  weights: 1
  databases: "MindfulTensors"
  collections: "fbirn"
  dbfields: ["falff"]
  metafields: ["gender_encoded"]
  epochs: 60
  prefetches: 16
  num_workers: 12
  prefetch_factor: 4
  attenuates: 0.8

resnet_specific:
  block_type: "basic"
  layers: [2, 2, 2, 2]  # ResNet architecture
  initial_stride: 2
  initial_kernel: 7
  initial_pool: True
  dropout: 0.2
  use_checkpointing: True

