# resnet3d_gender_bn_64base_2.2.2.2_exp01.yaml

mongo:
  host: "10.245.12.58"
  host_slurm: "arctrdcn018.rs.gsu.edu"
  validation_percent: 0.2
  index_id: "id"
  
wandb:
  team: "neuroneural"
  project: "holographic_project"

bit16: False

model:
  masked: False
  sparsity: 0.7
  snip_batch_size: 20
  smart_init: False  # Set to False by default, override via command line or dedicated config

  # Default paths (will be overridden when using smart_init)
  unimodal_model_paths: {}

  n_classes: 1
  model_channels: 64
  model_label: "_resnet3d_gender_64base"
  volume_shape: [256, 256, 256]
  maxshape: 300
  optimize_inline: False
  use_groupnorm: False
  use_me: True
  loss_weight: [0.5, 0.5]

paths:
  loadcheckpoint: False
  logdir: "./logs/"

client_creator:
  crop_tensor: False
  normalize: False

experiment:
  experiment_name: test
  cv_seed: 42
  cv_folds: 10
  lr_scale: 0.01
  cubesizes: 256
  numcubes: 1
  numvolumes: 8
  weights: 1
  databases: "MindfulTensors"
  collections: "fbirn"
  dbfields: ["falff"]
  metafields: ["gender_encoded"]
  epochs: 60
  prefetches: 16
  attenuates: 0.8

resnet_specific:
  block_type: "basic"
  layers: [2, 2, 2, 2]
  initial_stride: 2
  initial_kernel: 7
  initial_pool: True
  dropout: 0.2
  use_checkpointing: True
